# 老电脑 — 备用服务器
# 使用方式: cloudflared tunnel --config config.yml run
# DNS (首次执行): cloudflared tunnel route dns 51cc70a8 bak.mote-pal.xyz
tunnel: 51cc70a8-6e03-41b1-95f1-2d328dff6fdf
credentials-file: C:\Users\admin\.cloudflared\51cc70a8-6e03-41b1-95f1-2d328dff6fdf.json

ingress:
  - hostname: bak.mote-pal.xyz
    service: http://localhost:8930
  - service: http_status:404
