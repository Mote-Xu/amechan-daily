<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poketter — 超天酱日常</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #2D1B4E;
            --pink: #FF69B4;
            --purple: #9B59B6;
            --dark: #1a1a2e;
            --win-bg: #c0c0c0;
            --win-title: #000080;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image:
                linear-gradient(#3c2466 1px, transparent 1px),
                linear-gradient(90deg, #3c2466 1px, transparent 1px);
            background-size: 20px 20px;
            color: #fff;
            font-family: 'DotGothic16', 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .crt::before {
            content: " ";
            display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background:
                linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%),
                linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,255,0.06));
            z-index: 9999; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .window-border { border: 2px solid #fff; border-right-color: #888; border-bottom-color: #888; box-shadow: 2px 2px 0 #000; }
        .kangel-card { border: 4px solid var(--pink); box-shadow: 4px 4px 0 var(--purple); }
        .ame-card { border: 4px solid #4B0082; box-shadow: 4px 4px 0 #000; }

        .ame-card:hover {
            animation: glitch 0.3s cubic-bezier(0.25,0.46,0.45,0.94) both infinite;
        }
        @keyframes glitch {
            0% { transform: skew(0deg); }
            20% { transform: skew(-10deg); }
            40% { transform: skew(10deg); }
            60% { transform: skew(-5deg); }
            80% { transform: skew(5deg); }
            100% { transform: skew(0deg); }
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); border-left: 2px solid var(--pink); }
        ::-webkit-scrollbar-thumb { background: var(--pink); border: 2px solid #fff; }

        .app { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1.5rem 1rem; }
        .container { width: 100%; max-width: 680px; }

        /* ---- HEADER ---- */
        .header { text-align: center; margin-bottom: 1.5rem; }
        .header h1 { font-size: 2.8rem; color: var(--pink); font-weight: bold; text-shadow: 3px 3px 0 var(--purple); letter-spacing: 0.2em; }
        .header .subtitle { color: var(--purple); margin-top: 0.3rem; font-size: 0.75rem; }
        .status-dot { display: inline-block; width: 8px; height: 8px; background: #00ff88; box-shadow: 0 0 6px #00ff88; margin-right: 4px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* ---- STATUS BAR (game HUD) ---- */
        .status-bar {
            display: flex; justify-content: center; gap: 1rem; margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .status-item {
            background: rgba(0,0,0,0.4); border: 2px solid #555; padding: 0.4rem 0.8rem;
            display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem;
        }
        .status-item img { width: 24px; height: 24px; image-rendering: pixelated; }
        .status-item .val { color: var(--pink); font-size: 1rem; }
        .status-bar .bar-wrap { width: 60px; height: 6px; background: #333; border: 1px solid #555; }
        .status-bar .bar-fill { height: 100%; transition: width 0.5s; }
        .bar-fill.love { background: var(--pink); }
        .bar-fill.stress { background: #ff6347; }
        .bar-fill.yami { background: #8a2be2; }

        /* ---- WIN95 WINDOW ---- */
        .win95-outer { background: var(--win-bg); margin-bottom: 1rem; }
        .win95-titlebar {
            background: var(--win-title); color: #fff; padding: 0.25rem 0.5rem;
            display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem;
        }
        .win95-titlebar .btns { display: flex; gap: 2px; }
        .win95-titlebar .btn {
            background: var(--win-bg); color: #000; padding: 0 6px; font-size: 0.65rem;
            border: 2px solid #fff; border-right-color: #555; border-bottom-color: #555; line-height: 1.2;
        }
        .win95-body {
            background: var(--bg); padding: 1rem; max-height: 60vh; overflow-y: auto;
            border: 2px solid #888; border-top-color: #000; border-left-color: #000;
        }

        /* ---- DESKTOP ICONS ROW ---- */
        .desktop-icons {
            display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap;
        }
        .desktop-icon {
            text-align: center; cursor: default; width: 64px; opacity: 0.7; transition: opacity 0.2s;
        }
        .desktop-icon:hover { opacity: 1; }
        .desktop-icon .icon-box {
            width: 48px; height: 48px; margin: 0 auto 4px;
            background: rgba(0,0,0,0.3); border: 2px solid #555; display: flex;
            align-items: center; justify-content: center; font-size: 1.5rem;
        }
        .desktop-icon .icon-box img { width: 40px; height: 40px; image-rendering: pixelated; }
        .desktop-icon .label { font-size: 0.6rem; color: #ccc; word-wrap: break-word; }

        /* ---- TWEET CARDS ---- */
        .tweet-pair { margin-bottom: 1.5rem; }
        .tweet-pair:last-child { margin-bottom: 0; }
        .tweet-topic { text-align: center; color: var(--purple); font-size: 0.65rem; margin-bottom: 0.4rem; opacity: 0.7; }
        .tweet-topic span { background: rgba(155,89,182,0.2); padding: 2px 8px; border: 1px dashed var(--purple); }

        /* KAngel */
        .card-kangel { background: #fff; color: #222; padding: 1rem; position: relative; transition: transform 0.15s; margin-bottom: 0.4rem; }
        .card-kangel:hover { transform: scale(1.02); }
        .card-kangel .card-header { display: flex; align-items: flex-start; margin-bottom: 0.75rem; }
        .card-kangel .avatar {
            width: 48px; height: 48px; margin-right: 0.75rem; flex-shrink: 0;
            border: 2px solid var(--pink); background: var(--pink);
        }
        .card-kangel .avatar img { width: 100%; height: 100%; image-rendering: pixelated; }
        .card-kangel .card-selfie { margin-bottom: 0.75rem; }
        .card-kangel .card-selfie img { max-width: 100%; max-height: 240px; border: 2px solid #eee; display: block; }
        .card-kangel .username { font-weight: bold; color: var(--pink); font-size: 1.1rem; display: flex; align-items: center; gap: 0.4rem; }
        .card-kangel .badge { font-size: 0.55rem; background: var(--pink); color: #fff; padding: 1px 5px; }
        .card-kangel .timestamp { font-size: 0.65rem; color: #999; margin-top: 2px; }
        .card-kangel .card-body { font-size: 1rem; line-height: 1.6; white-space: pre-wrap; margin-bottom: 0.75rem; }
        .card-kangel .card-actions { display: flex; gap: 1rem; color: var(--pink); font-size: 0.85rem; border-top: 2px dashed var(--pink); padding-top: 0.5rem; }

        /* Ame */
        .card-ame { background: #111; color: #999; padding: 1rem; position: relative; transition: transform 0.15s; opacity: 0.92; }
        .card-ame:hover { transform: scale(1.02); }
        .card-ame .card-header { display: flex; align-items: flex-start; margin-bottom: 0.75rem; opacity: 0.85; }
        .card-ame .avatar {
            width: 48px; height: 48px; margin-right: 0.75rem; flex-shrink: 0;
            border: 2px solid #444; filter: grayscale(0.5) brightness(0.85);
        }
        .card-ame .avatar img { width: 100%; height: 100%; image-rendering: pixelated; }
        .card-ame .card-selfie { margin-bottom: 0.75rem; }
        .card-ame .card-selfie img { max-width: 100%; max-height: 240px; border: 2px solid #333; display: block; filter: grayscale(0.2) brightness(0.9); }
        .card-ame .username { font-weight: bold; color: #8a63b7; font-size: 1.1rem; }
        .card-ame .timestamp { font-size: 0.65rem; color: #555; margin-top: 2px; }
        .card-ame .card-body { font-size: 0.9rem; line-height: 1.6; white-space: pre-wrap; margin-bottom: 0.75rem; letter-spacing: -0.02em; }
        .card-ame .card-actions { display: flex; gap: 1rem; color: #555; font-size: 0.8rem; border-top: 2px dashed #333; padding-top: 0.5rem; }

        /* ---- EMPTY ---- */
        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--purple); }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .empty-state p { font-size: 0.85rem; opacity: 0.7; }

        /* ---- FOOTER ---- */
        .footer { text-align: center; margin-top: 1.5rem; color: var(--purple); font-size: 0.6rem; opacity: 0.5; }
        .footer .divider { margin: 0.5rem auto; width: 100px; border-top: 2px dashed var(--purple); opacity: 0.4; }
        .secret-hint { opacity: 0; transition: opacity 0.5s; font-size: 0.55rem; color: var(--purple); margin-top: 4px; }
        .header:hover .secret-hint { opacity: 1; }
    </style>
</head>
<body class="crt">
<div class="app">
<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h1>† Poketter †</h1>
        <div class="subtitle"><span class="status-dot"></span> LIVE v1.1</div>
        <div class="secret-hint">double-click title to refresh</div>
    </div>

    <!-- STATUS BAR (game HUD) -->
    <div class="status-bar">
        <div class="status-item">
            <img src="img/icon_status_follower_res.png" alt="followers">
            <span>Followers</span>
            <span class="val" id="stat-followers">999K</span>
        </div>
        <div class="status-item">
            <img src="img/icon_status_love_res.png" alt="love">
            <span>Affection</span>
            <div class="bar-wrap"><div class="bar-fill love" id="bar-love" style="width:78%"></div></div>
            <span class="val" style="font-size:0.7rem;">78</span>
        </div>
        <div class="status-item">
            <img src="img/icon_status_stress_res.png" alt="stress">
            <span>Stress</span>
            <div class="bar-wrap"><div class="bar-fill stress" id="bar-stress" style="width:42%"></div></div>
            <span class="val" style="font-size:0.7rem;color:#ff6347;">42</span>
        </div>
        <div class="status-item">
            <img src="img/icon_status_yami_res.png" alt="yami">
            <span>Darkness</span>
            <div class="bar-wrap"><div class="bar-fill yami" id="bar-yami" style="width:55%"></div></div>
            <span class="val" style="font-size:0.7rem;color:#8a2be2;">55</span>
        </div>
    </div>

    <!-- DESKTOP ICONS -->
    <div class="desktop-icons">
        <div class="desktop-icon">
            <div class="icon-box"><img src="img/icon_cho.png" alt="KAngel"></div>
            <div class="label">KAngel</div>
        </div>
        <div class="desktop-icon">
            <div class="icon-box"><img src="img/icon_ame.png" alt="Ame"></div>
            <div class="label">Ame</div>
        </div>
        <div class="desktop-icon">
            <div class="icon-box"><img src="img/JINE_amechan.png" alt="JINE"></div>
            <div class="label">JINE</div>
        </div>
    </div>

    <!-- WIN95 WINDOW -->
    <div class="win95-outer window-border">
        <div class="win95-titlebar">
            <span>Poketter.exe</span>
            <div class="btns">
                <span class="btn">─</span>
                <span class="btn">□</span>
                <span class="btn">✕</span>
            </div>
        </div>
        <div class="win95-body" id="feed-container">
            <!-- rendered by JS -->
        </div>
    </div>

    <div class="footer">
        <div class="divider"></div>
        超天酱日常推文小站 · Amechan Daily<br>
        游戏素材 © WSS playground / xemono
    </div>

</div>
</div>

<script>
(function() {
    var API = window.location.origin + '/api/feed';
    var POLL = 30000;
    var CONTAINER = document.getElementById('feed-container');
    var knownIds = {};
    var firstLoad = true;

    // Selfie pools (game assets)
    var choSelfies = ['cho_angel','cho_happy','cho_start','cho_sleepy','cho_cosplay','cho_pray','cho_yami','cho_akkanbe','cho_sorrow'];
    var ameSelfies = ['ame_home','ame_happy','ame_talk','ame_game','ame_cool','ame_home2','ame_sorrow','ame_cry'];

    function pickSelfie(list, idx) {
        return list[idx % list.length];
    }

    // Fake stat jiggle
    function jiggleStats() {
        var stats = {
            followers: 980000 + Math.floor(Math.random() * 50000),
            love: 65 + Math.floor(Math.random() * 25),
            stress: 30 + Math.floor(Math.random() * 40),
            yami: 35 + Math.floor(Math.random() * 45)
        };
        document.getElementById('stat-followers').textContent = Math.floor(stats.followers/1000) + 'K';
        document.getElementById('bar-love').style.width = stats.love + '%';
        document.getElementById('bar-stress').style.width = stats.stress + '%';
        document.getElementById('bar-yami').style.width = stats.yami + '%';
    }

    function renderFeed(feed) {
        if (!feed || feed.length === 0) {
            CONTAINER.innerHTML =
                '<div class="empty-state"><div class="icon">👼💊</div>' +
                '<p>等待超天酱上线…</p>' +
                '<p style="font-size:0.7rem;margin-top:0.5rem;">(启动后自动生成首条推文)</p></div>';
            return;
        }

        var html = '';
        feed.forEach(function(p, i) {
            if (!p.kangel || !p.ame) return;
            var choSelfie = 'img/' + pickSelfie(choSelfies, i) + '.png';
            var ameSelfie = 'img/' + pickSelfie(ameSelfies, i) + '.png';
            var topicHtml = p.topic ? '<div class="tweet-topic"><span># ' + esc(p.topic) + '</span></div>' : '';

            html += '<div class="tweet-pair">' + topicHtml +
                '<div class="card-kangel kangel-card">' +
                '<div class="card-header">' +
                '<div class="avatar"><img src="img/icon_cho.png" alt="KAngel"></div>' +
                '<div><div class="username">超天酱 <span class="badge">官方认证</span></div>' +
                '<div class="timestamp">@x_angelkawaii_x · ' + esc(p.date || '') + '</div></div></div>' +
                '<div class="card-body">' + esc(p.kangel) + '</div>' +
                '<div class="card-selfie"><img src="' + choSelfie + '" alt="selfie" onerror="this.style.display=\'none\'"></div>' +
                '<div class="card-actions"><span>💬 ' + rnd(8000,9999) + '</span><span>🔁 ' + rnd(5000,9999) + '</span><span>❤️ ' + rnd(800,999) + 'K</span></div>' +
                '</div>' +
                '<div class="card-ame ame-card">' +
                '<div class="card-header">' +
                '<div class="avatar"><img src="img/icon_ame.png" alt="Ame"></div>' +
                '<div><div class="username">糖糖</div>' +
                '<div class="timestamp">@ame_chan_xx · ' + esc(p.date || '') + '</div></div></div>' +
                '<div class="card-body">' + esc(p.ame) + '</div>' +
                '<div class="card-selfie"><img src="' + ameSelfie + '" alt="selfie" onerror="this.style.display=\'none\'"></div>' +
                '<div class="card-actions"><span>💬 ' + rnd(0,3) + '</span><span>🔁 0</span><span>💔 ' + rnd(1,5) + '</span></div>' +
                '</div></div>';
        });

        CONTAINER.innerHTML = html;
        feed.forEach(function(p) { knownIds[p.id] = true; });
        jiggleStats();
    }

    function esc(t) { var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function rnd(min,max) { return Math.floor(Math.random()*(max-min+1))+min; }

    function fetchFeed() {
        fetch(API).then(function(r) {
            if (!r.ok) throw new Error('HTTP '+r.status);
            return r.json();
        }).then(function(data) {
            var feed = data.feed || [];
            if (firstLoad) { renderFeed(feed); firstLoad = false; return; }
            var hasNew = feed.some(function(p) { return !knownIds[p.id]; });
            if (hasNew) renderFeed(feed);
        }).catch(function(err) {
            console.error('Feed error:', err);
            if (firstLoad) {
                CONTAINER.innerHTML = '<div class="empty-state"><div class="icon">💤</div><p>超天酱暂时失联…</p><p style="font-size:0.7rem;">请确认服务器已启动</p></div>';
                firstLoad = false;
            }
        });
    }

    document.querySelector('.header h1').addEventListener('dblclick', function() {
        firstLoad = true; fetchFeed();
    });

    fetchFeed();
    setInterval(fetchFeed, POLL);
    console.log('+ Poketter v1.1 ready +');
})();
</script>
</body>
</html>
