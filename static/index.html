<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poketter — 超天酱日常</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #2D1B4E; --pink: #FF69B4; --purple: #9B59B6; --dark: #1a1a2e;
    --win-bg: #c0c0c0; --win-title: #000080;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: var(--bg);
    background-image: linear-gradient(#3c2466 1px, transparent 1px), linear-gradient(90deg, #3c2466 1px, transparent 1px);
    background-size: 20px 20px;
    color: #fff; font-family: 'DotGothic16','Microsoft YaHei',sans-serif;
    overflow-x: hidden; min-height: 100vh;
    box-shadow: inset 0 0 120px rgba(0,0,0,0.5);
}
.crt::before {
    content:""; display:block; position:fixed; top:0;left:0;bottom:0;right:0;
    background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%),
                linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,255,0.06));
    z-index:9999; background-size:100% 2px, 3px 100%; pointer-events:none;
}
.window-border { border:2px solid #fff; border-right-color:#888; border-bottom-color:#888; box-shadow:2px 2px 0 #000; }
.kangel-card { border:4px solid var(--pink); box-shadow:4px 4px 0 var(--purple); }
.ame-card { border:4px solid #4B0082; box-shadow:4px 4px 0 #000; }
.ame-card:hover { animation: glitch 0.3s cubic-bezier(0.25,0.46,0.45,0.94) both infinite; }
@keyframes glitch { 0%{transform:skew(0)} 20%{transform:skew(-10deg)} 40%{transform:skew(10deg)} 60%{transform:skew(-5deg)} 80%{transform:skew(5deg)} 100%{transform:skew(0)} }
::-webkit-scrollbar { width:8px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--pink); border:1px solid #fff; }

.app { position:relative; z-index:10; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:1rem; }
.container { width:100%; max-width:700px; }

/* HEADER */
.header { text-align:center; margin-bottom:1rem; }
.header h1 { font-size:2.5rem; color:var(--pink); text-shadow:3px 3px 0 var(--purple); letter-spacing:0.2em; }
.header .subtitle { color:var(--purple); font-size:0.7rem; margin-top:0.2rem; }
.status-dot { display:inline-block; width:8px; height:8px; background:#00ff88; box-shadow:0 0 6px #00ff88; margin-right:4px; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* STATUS BAR */
.status-bar { display:flex; justify-content:center; gap:0.8rem; margin-bottom:1rem; flex-wrap:wrap; }
.status-item { background:rgba(0,0,0,0.4); border:2px solid #555; padding:0.3rem 0.6rem; display:flex; align-items:center; gap:0.4rem; font-size:0.7rem; }
.status-item img { width:20px; height:20px; image-rendering:pixelated; }
.status-item .val { color:var(--pink); font-size:0.9rem; }
.bar-wrap { width:50px; height:5px; background:#333; border:1px solid #555; }
.bar-fill { height:100%; transition:width 0.5s; }
.bar-fill.love { background:var(--pink); } .bar-fill.stress { background:#ff6347; } .bar-fill.yami { background:#8a2be2; }

/* DESKTOP ICONS */
.desktop-icons { display:flex; justify-content:center; gap:1.2rem; margin-bottom:1rem; }
.desktop-icon { text-align:center; width:56px; opacity:0.7; cursor:pointer; transition:opacity 0.2s; }
.desktop-icon:hover,.desktop-icon.active { opacity:1; }
.desktop-icon .icon-box { width:40px; height:40px; margin:0 auto 2px; background:rgba(0,0,0,0.3); border:2px solid #555; display:flex; align-items:center; justify-content:center; }
.desktop-icon .icon-box img { width:34px; height:34px; image-rendering:pixelated; }
.desktop-icon .label { font-size:0.55rem; color:#ccc; }
.desktop-icon.active .icon-box { border-color:var(--pink); }

/* WIN95 WINDOW */
.win95-outer { background:var(--win-bg); margin-bottom:0.5rem; }
.win95-titlebar { background:var(--win-title); color:#fff; padding:0.2rem 0.5rem; display:flex; justify-content:space-between; align-items:center; font-size:0.75rem; }
.win95-titlebar .btns { display:flex; gap:2px; }
.win95-titlebar .btn { background:var(--win-bg); color:#000; padding:0 5px; font-size:0.6rem; border:2px solid #fff; border-right-color:#555; border-bottom-color:#555; }
.win95-body { background:var(--bg); padding:0.8rem; max-height:55vh; overflow-y:auto; border:2px solid #888; border-top-color:#000; border-left-color:#000; }

/* TABS */
.tabs { display:flex; gap:0; margin-bottom:1rem; }
.tab-btn { flex:1; padding:0.4rem; border:2px solid #555; background:rgba(0,0,0,0.3); color:#888; font-family:inherit; font-size:0.8rem; cursor:pointer; text-align:center; }
.tab-btn.active { color:var(--pink); border-color:var(--pink); background:rgba(255,105,180,0.1); }
.tab-btn:hover { color:#ccc; }

/* TWEET CARDS */
.tweet-pair { margin-bottom:1rem; }
.tweet-pair:last-child { margin-bottom:0; }
.batch-divider { text-align:center; color:var(--purple); font-size:0.6rem; margin:0.8rem 0 0.5rem; opacity:0.6; }
.batch-divider span { background:rgba(155,89,182,0.15); padding:2px 10px; border:1px dashed var(--purple); }
.tweet-topic { text-align:center; color:var(--purple); font-size:0.6rem; margin-bottom:0.3rem; opacity:0.6; }

.card-kangel { background:#fff; color:#222; padding:0.8rem; position:relative; transition:transform 0.15s; margin-bottom:0.3rem; }
.card-kangel:hover { transform:scale(1.02); }
.card-kangel .card-header { display:flex; align-items:flex-start; margin-bottom:0.6rem; }
.card-kangel .avatar { width:40px; height:40px; margin-right:0.6rem; flex-shrink:0; border:2px solid var(--pink); background:var(--pink); }
.card-kangel .avatar img { width:100%; height:100%; image-rendering:pixelated; }
.card-kangel .username { font-weight:bold; color:var(--pink); font-size:1rem; display:flex; align-items:center; gap:0.3rem; }
.card-kangel .badge { font-size:0.5rem; background:var(--pink); color:#fff; padding:1px 4px; }
.card-kangel .timestamp { font-size:0.6rem; color:#999; }
.card-kangel .card-body { font-size:0.9rem; line-height:1.5; white-space:pre-wrap; margin-bottom:0.5rem; }
.card-kangel .card-selfie { margin-bottom:0.5rem; }
.card-kangel .card-selfie img { max-width:100%; max-height:200px; border:2px solid #eee; display:block; }
.card-kangel .card-actions { display:flex; gap:0.8rem; color:var(--pink); font-size:0.8rem; border-top:2px dashed var(--pink); padding-top:0.4rem; }

.card-ame { background:#111; color:#999; padding:0.8rem; position:relative; transition:transform 0.15s; opacity:0.92; }
.card-ame:hover { transform:scale(1.02); }
.card-ame .card-header { display:flex; align-items:flex-start; margin-bottom:0.6rem; opacity:0.85; }
.card-ame .avatar { width:40px; height:40px; margin-right:0.6rem; flex-shrink:0; border:2px solid #444; filter:grayscale(0.5) brightness(0.85); }
.card-ame .avatar img { width:100%; height:100%; image-rendering:pixelated; }
.card-ame .username { font-weight:bold; color:#8a63b7; font-size:1rem; }
.card-ame .timestamp { font-size:0.6rem; color:#555; }
.card-ame .card-body { font-size:0.85rem; line-height:1.5; white-space:pre-wrap; margin-bottom:0.5rem; letter-spacing:-0.02em; }
.card-ame .card-selfie { margin-bottom:0.5rem; }
.card-ame .card-selfie img { max-width:100%; max-height:200px; border:2px solid #333; display:block; filter:grayscale(0.2) brightness(0.9); }
.card-ame .card-actions { display:flex; gap:0.8rem; color:#555; font-size:0.75rem; border-top:2px dashed #333; padding-top:0.4rem; }

/* JINE BUBBLES */
.jine-chat { padding:0.5rem; }
.jine-msg { display:flex; margin-bottom:0.4rem; align-items:flex-end; gap:0.4rem; }
.jine-msg .bubble { max-width:80%; padding:0.5rem 0.7rem; border-radius:12px; font-size:0.85rem; line-height:1.4; }
.jine-msg.sent { justify-content:flex-end; }
.jine-msg.sent .bubble { background:var(--purple); color:#fff; border-bottom-right-radius:3px; }
.jine-msg.sent .time { font-size:0.5rem; color:#666; }
.jine-msg.received { justify-content:flex-start; }
.jine-msg.received .bubble { background:#333; color:#ccc; border-bottom-left-radius:3px; }
.jine-msg.received .time { font-size:0.5rem; color:#555; }

/* LIVE WIDGET */
.live-widget { margin-bottom:1rem; background:rgba(0,0,0,0.5); border:2px solid #333; padding:0.5rem 0.8rem; display:flex; align-items:center; justify-content:space-between; }
.live-badge { display:flex; align-items:center; gap:0.4rem; }
.live-dot { width:10px; height:10px; background:red; border-radius:50%; animation:livePulse 1.2s infinite; }
@keyframes livePulse { 0%,100%{opacity:1;box-shadow:0 0 4px red} 50%{opacity:0.3;box-shadow:0 0 12px red} }
.live-text { color:red; font-size:0.75rem; font-weight:bold; }
.live-viewers { color:#ccc; font-size:0.7rem; }
.danmaku-bar { height:26px; overflow:hidden; position:relative; margin-bottom:1rem; border-bottom:1px solid #333; }
.danmaku-wrap { position:absolute; white-space:nowrap; display:flex; align-items:center; gap:4px; animation:scrollR 10s linear infinite; }
.danmaku-text { font-size:0.65rem; color:#aaa; pointer-events:none; }
.danmaku-text.fan { color:var(--pink); text-shadow:0 0 4px rgba(255,105,180,0.3); }
.danmaku-text.hate { color:#ccc; }
.danmaku-trash { display:none; width:14px; height:16px; cursor:pointer; opacity:0.7; flex-shrink:0; }
.danmaku-trash:hover { opacity:1; transform:scale(1.15); }
.danmaku-wrap:hover .danmaku-text.hate ~ .danmaku-trash { display:inline-block; }
@keyframes scrollR { from { transform:translateX(720px); } to { transform:translateX(-250px); } }
/* pixel trash can drawn with CSS */
.pixel-trash { display:inline-block; width:16px; height:18px; image-rendering:pixelated; position:relative; }
.pixel-trash::before { content:''; position:absolute; top:0;left:2px;width:12px;height:3px;background:#999;
    box-shadow: 0 1px 0 #777; }
.pixel-trash::after { content:''; position:absolute; top:4px;left:3px;width:10px;height:12px;background:#888;
    box-shadow: 0 1px 0 #777, 0 2px 0 #999, 1px 0 0 #666, -1px 0 0 #666; }
.pixel-trash-body { position:absolute; top:8px;left:3px;width:10px;height:2px;background:#aaa; }
.danmaku-wrap:hover .pixel-trash { opacity:1; }
@keyframes scroll { from { transform:translateX(700px); } to { transform:translateX(-200px); } }
@keyframes flyToTrash { 0% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.3) translateY(-20px); } 100% { opacity:0; transform:scale(0) translateY(-40px); } }
.danmaku-wrap.trashed { animation:flyToTrash 0.4s ease-out forwards; pointer-events:none; }

/* TRASH CAN */
.trash-widget { position:fixed; bottom:16px; right:16px; z-index:100; text-align:center; }
.trash-can { width:56px; height:56px; background:rgba(0,0,0,0.7); border:2px solid #666; display:flex; align-items:center; justify-content:center; cursor:default; transition:all 0.2s; image-rendering:pixelated; }
.trash-can img { width:32px; height:32px; image-rendering:pixelated; opacity:0.7; }
.trash-can.active { border-color:var(--pink); box-shadow:0 0 16px rgba(255,105,180,0.5); }
.trash-can.active img { opacity:1; }
.trash-can.shake { animation:shake 0.3s ease; }
.trash-count { font-size:0.55rem; color:#666; margin-top:2px; }
.trash-label { font-size:0.5rem; color:#555; margin-top:1px; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }

/* F7 BUTTON */
.f7-area { text-align:center; margin:0.8rem 0; }
.f7-btn { background:rgba(255,105,180,0.15); color:var(--pink); border:2px dashed var(--pink); padding:0.5rem 1.2rem; font-family:inherit; font-size:0.8rem; cursor:pointer; transition:all 0.2s; }
.f7-btn:hover { background:rgba(255,105,180,0.3); border-style:solid; }
.f7-btn:active { transform:scale(0.96); }
.f7-btn .count { font-size:0.6rem; color:var(--purple); display:block; margin-top:2px; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }
.f7-btn.shaking { animation:shake 0.3s ease; }

/* EMPTY */
.empty-state { text-align:center; padding:3rem 1rem; color:var(--purple); }
.empty-state .icon { font-size:3rem; margin-bottom:1rem; animation:float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.empty-state p { font-size:0.85rem; opacity:0.7; }

/* FOOTER */
.footer { text-align:center; margin-top:1rem; color:var(--purple); font-size:0.55rem; opacity:0.5; }
.footer .divider { margin:0.3rem auto; width:80px; border-top:2px dashed var(--purple); opacity:0.4; }
</style>
</head>
<body class="crt">
<div class="app">
<div class="container">

<div class="header">

<!-- STATUS BAR -->

    <div class="status-item"><img src="img/icon_status_stress_res.png"><span>Stress</span><div class="bar-wrap"><div class="bar-fill stress" id="bar-stress" style="width:42%"></div></div></div>

</div>

<script>
(function() {
var API = window.location.origin;
var CONTAINER = document.getElementById('feed-container');
var ACTIVE_TAB = 'all';
var knownBatches = {};
var firstLoad = true;
var poolRemaining = 0;

var choSelfies = ['cho_angel','cho_happy','cho_start','cho_sleepy','cho_cosplay','cho_pray','cho_yami','cho_akkanbe','cho_sorrow'];
var ameSelfies = ['ame_home','ame_happy','ame_talk','ame_game','ame_cool','ame_home2','ame_sorrow','ame_cry'];

function pickSelfie(list, idx) { return list[idx % list.length]; }

// Danmaku pool
var danmakuPool = {
    fan:  ['✟升天✟','✟升天✟','小天使请安','小天使请安','超天酱贴贴！','kirakira💖','888888','守护','好可爱','互联网天使','主播别走','www'],
    hate: ['盐我','鸽了','又在卖惨？','草','？？？','好无聊','假的吧','阿P出来挨打']
};
function pickDanmaku(pool) { return pool[Math.floor(Math.random() * pool.length)]; }
var danmakuWraps = [];
var trashCount = 0;
var DANMAKU_COUNT = 5;

function initDanmaku() {
    var bar = document.getElementById('danmaku-bar');

    // Event delegation: one click handler for all trash icons
    bar.addEventListener('click', function(e) {
        var trash = e.target.closest('.danmaku-trash');
        if (!trash) return;
        e.stopPropagation();
        var wrap = trash.closest('.danmaku-wrap');
        if (wrap) trashDanmaku(wrap);
    });

    var positions = [2, 7, 12, 17, 22]; // 5 danmaku evenly spaced in 26px bar
    for (var i = 0; i < DANMAKU_COUNT; i++) {
        var wrap = document.createElement('span');
        wrap.className = 'danmaku-wrap';
        wrap.style.top = positions[i] + 'px';
        wrap.style.animationDuration = (8 + Math.random() * 8) + 's';
        wrap.style.animationDelay = (Math.random() * 10) + 's';

        spawnDanmakuContent(wrap);
        bar.appendChild(wrap);
        danmakuWraps.push(wrap);
    }
    setInterval(refreshDanmaku, 6000);
    setInterval(autoCleanDanmaku, 15000);
}

function spawnDanmakuContent(wrap) {
    // Clear existing
    wrap.innerHTML = '';
    var isHate = Math.random() < 0.3;
    var pool = isHate ? danmakuPool.hate : danmakuPool.fan;

    var textEl = document.createElement('span');
    textEl.className = 'danmaku-text' + (isHate ? ' hate' : ' fan');
    textEl.textContent = pickDanmaku(pool);
    wrap.appendChild(textEl);

    if (isHate) {
        var trashIcon = document.createElement('span');
        trashIcon.className = 'danmaku-trash pixel-trash';
        trashIcon.title = '扔进垃圾桶';
        wrap.appendChild(trashIcon);
    }
}

function refreshDanmaku() {
    danmakuWraps.forEach(function(wrap) {
        if (wrap.classList.contains('trashed')) return;
        if (Math.random() < 0.25) {
            spawnDanmakuContent(wrap);
        }
    });
}

function autoCleanDanmaku() {
    danmakuWraps.forEach(function(wrap) {
        if (wrap.classList.contains('trashed')) return;
        if (wrap.querySelector('.danmaku-trash') && Math.random() < 0.12) {
            trashDanmaku(wrap, true);
        }
    });
}

function trashDanmaku(wrap, silent) {
    if (!wrap || wrap.classList.contains('trashed')) return;
    wrap.classList.add('trashed');
    trashCount++;
    document.getElementById('trash-count').textContent = trashCount;

    var can = document.getElementById('trash-can');
    can.classList.add('shake');
    if (!silent) { can.classList.add('active'); }
    setTimeout(function() { can.classList.remove('shake','active'); }, 400);

    var stressBar = document.getElementById('bar-stress');
    var curStress = parseInt(stressBar.style.width) || 42;
    stressBar.style.width = Math.max(10, curStress - 3) + '%';

    // Respawn after elimination
    setTimeout(function() {
        wrap.classList.remove('trashed');
        spawnDanmakuContent(wrap);
    }, 500);
}

// Live viewer count
function jiggleLive() {
    var base = 12000 + Math.floor(Math.random() * 20) - 10;
    var el = document.getElementById('live-count');
    if (el) el.textContent = base.toLocaleString();
}
setInterval(jiggleLive, 3000);

// Stats jiggle
function jiggleStats() {
    document.getElementById('stat-f').textContent = (980 + Math.floor(Math.random()*50)) + 'K';
    document.getElementById('bar-love').style.width = (54 + Math.floor(Math.random()*20)) + '%';
    document.getElementById('bar-stress').style.width = (30 + Math.floor(Math.random()*40)) + '%';
    document.getElementById('bar-yami').style.width = (35 + Math.floor(Math.random()*45)) + '%';
}

// Tab switching
function switchTab(tab) {
    ACTIVE_TAB = tab;
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.tab === tab); });
    document.querySelectorAll('.desktop-icon').forEach(function(i) { i.classList.toggle('active', i.dataset.tab === tab); });
    renderFromCache();
}

document.querySelectorAll('.tab-btn').forEach(function(b) {
    b.addEventListener('click', function() { switchTab(this.dataset.tab); });
});
document.querySelectorAll('.desktop-icon').forEach(function(i) {
    i.addEventListener('click', function() { switchTab(this.dataset.tab); });
});

// Cache
var cachedTimeline = [];

function renderFromCache() {
    var filtered = cachedTimeline;
    if (ACTIVE_TAB === 'diary') {
        filtered = cachedTimeline.filter(function(e) { return e.layer === 'diary'; });
    } else if (ACTIVE_TAB === 'jine') {
        filtered = cachedTimeline.filter(function(e) { return e.layer === 'jine'; });
    }
    renderFeed(filtered);
}

// Render
function renderFeed(items) {
    if (!items || items.length === 0) {
        CONTAINER.innerHTML = '<div class="empty-state"><div class="icon">👼</div><p>等待超天酱上线...</p></div>';
        return;
    }

    var html = '';
    var lastBatch = '';

    // For JINE tab, render as chat bubbles
    if (ACTIVE_TAB === 'jine') {
        html = '<div class="jine-chat">';
        items.forEach(function(e) {
            html += '<div class="jine-msg sent"><span class="time">' + esc(e.time||'') + '</span><div class="bubble">' + esc(e.text) + '</div></div>';
        });
        html += '</div>';
        CONTAINER.innerHTML = html;
        return;
    }

    items.forEach(function(e, i) {
        // Batch divider
        if (e.batch_id && e.batch_id !== lastBatch && e.layer !== 'jine') {
            html += '<div class="batch-divider"><span>' + esc(e.event || '') + '</span></div>';
            lastBatch = e.batch_id;
        }

        var dayN = Math.floor(i / 3) + 1;
        if (e.layer === 'poketter') {
            var selfie = 'img/' + pickSelfie(choSelfies, i) + '.png';
            var likes = Math.floor(dayN * 12 + Math.random() * 30);
            var rts = Math.floor(dayN * 4 + Math.random() * 15);
            html += '<div class="tweet-pair"><div class="card-kangel kangel-card">' +
                '<div class="card-header"><div class="avatar"><img src="img/icon_cho.png"></div>' +
                '<div><div class="username">🎀超绝最可爱🎁天使酱 <span class="badge">✨认证</span></div>' +
                '<div class="timestamp">@x_angelkawaii_x · 第' + dayN + '天 · ' + esc(e.time||'') + '</div></div></div>' +
                '<div class="card-body">' + esc(e.text) + '</div>' +
                '<div class="card-selfie"><img src="' + selfie + '" onerror="this.style.display=\'none\'"></div>' +
                '<div class="card-actions"><span>⭐ ' + likes + '</span><span>🔁 ' + rts + '</span></div>' +
                '</div></div>';
        } else if (e.layer === 'diary') {
            html += '<div class="tweet-pair"><div class="card-ame ame-card">' +
                '<div class="card-header"><div class="avatar"><img src="img/icon_ame.png"></div>' +
                '<div><div class="username">💙糖糖💙</div>' +
                '<div class="timestamp">@raincandy_U · 第' + dayN + '天 · ' + esc(e.time||'') + '</div></div></div>' +
                '<div class="card-body">' + esc(e.text) + '</div>' +
                '<div class="card-actions"><span>💬 ' + rnd(0,2) + '</span></div>' +
                '</div></div>';
        }
    });

    // No items in current tab
    if (!html && ACTIVE_TAB !== 'all') {
        html = '<div class="empty-state"><div class="icon">🔒</div><p>这里还没有内容</p></div>';
    }

    CONTAINER.innerHTML = html;
}

function esc(t) { var d = document.createElement('div'); d.textContent = t||''; return d.innerHTML; }
function rnd(min,max) { return Math.floor(Math.random()*(max-min+1))+min; }

// Fetch
function fetchTimeline() {
    fetch(API + '/api/timeline').then(function(r) { return r.json(); }).then(function(data) {
        cachedTimeline = data.timeline || [];
        poolRemaining = data.pool_remaining || 0;
        updatePoolCount();
        if (firstLoad) { renderFromCache(); firstLoad = false; return; }
        // Check for new batches
        var hasNew = cachedTimeline.some(function(e) { return !knownBatches[e.batch_id]; });
        if (hasNew) {
            cachedTimeline.forEach(function(e) { knownBatches[e.batch_id] = true; });
            renderFromCache();
        }
    }).catch(function(err) {
        console.error('Feed error:', err);
        if (firstLoad) {
            CONTAINER.innerHTML = '<div class="empty-state"><div class="icon">💤</div><p>超天酱暂时失联...</p></div>';
            firstLoad = false;
        }
    });
}

function updatePoolCount() {
    var el = document.getElementById('f7-count');
    if (el) el.textContent = poolRemaining > 0 ? '(' + poolRemaining + ' 条待发)' : '(空了..)';
}

// F7 Release
window.doRelease = function() {
    var btn = document.getElementById('f7-btn');
    btn.classList.add('shaking');
    btn.textContent = '...';
    btn.disabled = true;
    fetch(API + '/api/release', { method: 'POST' }).then(function(r) { return r.json(); }).then(function(data) {
        if (data.ok) {
            fetchTimeline();
            btn.textContent = '已发送! ✨';
            setTimeout(function() { btn.textContent = '[ F7 ] 戳一戳 ✨'; btn.disabled = false; btn.classList.remove('shaking'); }, 2000);
        } else {
            btn.textContent = '生成中...';
            // Trigger generation then retry
            fetch(API + '/api/generate', { method: 'POST', body: '{}' }).then(function() {
                fetchTimeline();
                btn.textContent = '[ F7 ] 戳一戳 ✨';
                btn.disabled = false;
                btn.classList.remove('shaking');
            });
        }
    }).catch(function() {
        btn.textContent = '戳一戳超天酱 ✨';
        btn.disabled = false;
    });
};

// F7 keyboard shortcut
document.addEventListener('keydown', function(e) {
    if (e.key === 'F7') { e.preventDefault(); doRelease(); }
});

// Init
initDanmaku();
jiggleLive();
jiggleStats();
setInterval(jiggleStats, 15000);
fetchTimeline();
setInterval(fetchTimeline, 30000);
console.log('+ Poketter v2.0 ready +');
})();
</script>
