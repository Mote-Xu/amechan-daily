<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poketter — 超天酱日常</title>
<!-- Google Fonts removed: blocks page load in China. Using system fallback -->
<style>
:root {
    --bg: #2D1B4E; --pink: #FF69B4; --purple: #9B59B6; --dark: #1a1a2e;
    --win-bg: #c0c0c0; --win-title: #000080;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: var(--bg);
    background-image: linear-gradient(#3c2466 1px, transparent 1px), linear-gradient(90deg, #3c2466 1px, transparent 1px);
    background-size: 20px 20px;
    color: #fff; font-family: 'DotGothic16','Microsoft YaHei',sans-serif;
    overflow-x: hidden; min-height: 100vh;
    box-shadow: inset 0 0 120px rgba(0,0,0,0.5);
}
.crt::before {
    content:""; display:block; position:fixed; top:0;left:0;bottom:0;right:0;
    background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%),
                linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,255,0.06));
    z-index:9999; background-size:100% 2px, 3px 100%; pointer-events:none;
}
.window-border { border:2px solid #fff; border-right-color:#888; border-bottom-color:#888; box-shadow:2px 2px 0 #000; }
.kangel-card { border:4px solid var(--pink); box-shadow:4px 4px 0 var(--purple); }
.ame-card { border:4px solid #4B0082; box-shadow:4px 4px 0 #000; }
.ame-card:hover { animation: glitch 0.3s cubic-bezier(0.25,0.46,0.45,0.94) both infinite; }
@keyframes glitch { 0%{transform:skew(0)} 20%{transform:skew(-10deg)} 40%{transform:skew(10deg)} 60%{transform:skew(-5deg)} 80%{transform:skew(5deg)} 100%{transform:skew(0)} }
::-webkit-scrollbar { width:8px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--pink); border:1px solid #fff; }

.app { position:relative; z-index:10; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:1rem; }
.container { width:100%; max-width:700px; }

/* HEADER */
.header { text-align:center; margin-bottom:1rem; }
.header h1 { font-size:2.5rem; color:var(--pink); text-shadow:3px 3px 0 var(--purple); letter-spacing:0.2em; }
.header .subtitle { color:var(--purple); font-size:0.7rem; margin-top:0.2rem; }
.status-dot { display:inline-block; width:8px; height:8px; background:#00ff88; box-shadow:0 0 6px #00ff88; margin-right:4px; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* STATUS BAR */
	.status-bar { display:flex; justify-content:center; gap:0.35rem; margin-bottom:1rem; flex-wrap:nowrap; }
	.status-item { background:rgba(0,0,0,0.4); border:2px solid #555; padding:0.25rem 0.4rem; display:flex; align-items:center; gap:0.25rem; font-size:0.62rem; white-space:nowrap; flex-shrink:0; }
	.status-item img { width:16px; height:16px; image-rendering:pixelated; }
	.status-item .val { color:var(--pink); font-size:0.75rem; }
	.bar-wrap { width:36px; height:5px; background:#333; border:1px solid #555; }
.bar-fill { height:100%; transition:width 0.5s; }
.bar-fill.love { background:var(--pink); } .bar-fill.stress { background:#ff6347; } .bar-fill.yami { background:#8a2be2; }

/* DESKTOP ICONS */
.desktop-icons { display:flex; justify-content:center; gap:1.2rem; margin-bottom:1rem; }
.desktop-icon { text-align:center; width:56px; opacity:0.7; cursor:pointer; transition:opacity 0.2s; }
.desktop-icon:hover,.desktop-icon.active { opacity:1; }
.desktop-icon .icon-box { width:40px; height:40px; margin:0 auto 2px; background:rgba(0,0,0,0.3); border:2px solid #555; display:flex; align-items:center; justify-content:center; }
.desktop-icon .icon-box img { width:34px; height:34px; image-rendering:pixelated; }
.desktop-icon .label { font-size:0.55rem; color:#ccc; }
.desktop-icon.active .icon-box { border-color:var(--pink); }

/* WIN95 WINDOW */
.win95-outer { background:var(--win-bg); margin:0 auto 0.5rem; aspect-ratio:266/388; max-width:500px; max-height:85vh; display:flex; flex-direction:column; overflow:hidden; }
.win95-titlebar { background:var(--win-title); color:#fff; padding:0.2rem 0.5rem; display:flex; justify-content:space-between; align-items:center; font-size:0.75rem; flex-shrink:0; }
.win95-titlebar .btns { display:flex; gap:2px; }
.win95-titlebar .btn { background:var(--win-bg); color:#000; padding:0 5px; font-size:0.6rem; border:2px solid #fff; border-right-color:#555; border-bottom-color:#555; }
.win95-body { background:var(--bg); padding:0.8rem; flex:1; overflow-y:auto; border:2px solid #888; border-top-color:#000; border-left-color:#000; }

/* TABS */
.tabs { display:flex; gap:0; margin-bottom:1rem; }
.tab-btn { flex:1; padding:0.4rem; border:2px solid #555; background:rgba(0,0,0,0.3); color:#888; font-family:inherit; font-size:0.8rem; cursor:pointer; text-align:center; }
.tab-btn.active { color:var(--pink); border-color:var(--pink); background:rgba(255,105,180,0.1); }
.tab-btn:hover { color:#ccc; }

/* TWEET CARDS */
.tweet-pair { margin-bottom:1rem; }
.tweet-pair:last-child { margin-bottom:0; }
.batch-divider { text-align:center; color:var(--purple); font-size:0.6rem; margin:0.8rem 0 0.5rem; opacity:0.6; }
.batch-divider span { background:rgba(155,89,182,0.15); padding:2px 10px; border:1px dashed var(--purple); }
.tweet-topic { text-align:center; color:var(--purple); font-size:0.6rem; margin-bottom:0.3rem; opacity:0.6; }

.card-kangel { background:#fff; color:#222; padding:0.8rem; position:relative; transition:transform 0.15s; margin-bottom:0.3rem; }
.card-kangel:hover { transform:scale(1.02); }
.card-kangel .card-header { display:flex; align-items:flex-start; margin-bottom:0.6rem; }
.card-kangel .avatar { width:40px; height:40px; margin-right:0.6rem; flex-shrink:0; border:2px solid var(--pink); background:var(--pink); }
.card-kangel .avatar img { width:100%; height:100%; image-rendering:pixelated; }
.at-user {
    font-size: 0.65rem;
    color: #888;
    font-weight: normal;
}
.card-ame .at-user { color: #666; }
.card-kangel .username { font-weight:bold; color:var(--pink); font-size:1rem; display:flex; align-items:center; gap:0.3rem; }
.card-kangel .badge { font-size:0.5rem; background:var(--pink); color:#fff; padding:1px 4px; }
.card-kangel .timestamp { font-size:0.6rem; color:#999; }
.card-kangel .card-body { font-size:0.9rem; line-height:1.5; white-space:pre-wrap; margin-bottom:0.5rem; }
.card-kangel .card-selfie { margin-bottom:0.5rem; }
.card-kangel .card-selfie img { max-width:100%; max-height:200px; border:2px solid #eee; display:block; }
.card-kangel .card-actions { display:flex; gap:0.8rem; color:var(--pink); font-size:0.8rem; border-top:2px dashed var(--pink); padding-top:0.4rem; }

.card-ame { background:#111; color:#999; padding:0.8rem; position:relative; transition:transform 0.15s; opacity:0.92; }
.card-ame:hover { transform:scale(1.02); }
.card-ame .card-header { display:flex; align-items:flex-start; margin-bottom:0.6rem; opacity:0.85; }
.card-ame .avatar { width:40px; height:40px; margin-right:0.6rem; flex-shrink:0; border:2px solid #444; filter:grayscale(0.5) brightness(0.85); }
.card-ame .avatar img { width:100%; height:100%; image-rendering:pixelated; }
.card-ame .username { font-weight:bold; color:#8a63b7; font-size:1rem; }
.card-ame .timestamp { font-size:0.6rem; color:#555; }
.card-ame .card-body { font-size:0.85rem; line-height:1.5; white-space:pre-wrap; margin-bottom:0.5rem; letter-spacing:-0.02em; }
.card-ame .card-selfie { margin-bottom:0.5rem; }
.card-ame .card-selfie img { max-width:100%; max-height:200px; border:2px solid #333; display:block; filter:grayscale(0.2) brightness(0.9); }
.card-ame .card-actions { display:flex; gap:0.8rem; color:#555; font-size:0.75rem; border-top:2px dashed #333; padding-top:0.4rem; }

/* ============================================================
   JINE — 游戏原版还原
   糖糖消息: 左对齐, #A0D8F0 气泡 + 三角尾巴
   阿P贴图:   右对齐, 无气泡, 纯贴图
   回复栏:     2×4 猫咪 sticker, #C898D8 底
   参考:       Steam 游戏截图
   ============================================================ */

/* 聊天区容器 */
.jine-chat {
    padding: 12px 16px;
	    background: transparent;
    min-height: 120px;
}

/* 糖糖头像 */
.jine-avatar {
    width: 34px; height: 34px;
    border-radius: 4px;
    flex-shrink: 0;
    image-rendering: pixelated;
    border: 1px solid rgba(0,0,0,0.1);
}
.jine-avatar img { width: 100%; height: 100%; image-rendering: pixelated; }

/* 基础消息行 */
.jine-msg { display: flex; margin-bottom: 10px; align-items: flex-end; gap: 6px; }

/* 糖糖消息（左对齐, 带头像 + 气泡尾） */
.jine-msg.ame { justify-content: flex-start; align-items: flex-start; }
.jine-msg.ame .bubble {
    background: #A0D8F0;
    color: #000;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.5;
    max-width: 75%;
    position: relative;
    margin-left: 2px;
}
/* 气泡左三角尾 */
.jine-msg.p-text {
    justify-content: flex-end;
    padding: 2px 0;
}
.player-text-bubble {
    background: #B8E8B8;
    color: #000;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 13px;
    max-width: 70%;
    line-height: 1.4;
}
.jine-msg.ame .bubble::before {
    content: '';
    position: absolute;
    left: -6px; top: 10px;
    width: 0; height: 0;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    border-right: 7px solid #A0D8F0;
}
.jine-msg.ame .time {
    font-size: 10px; color: rgba(0,0,0,0.4);
    align-self: flex-end; margin-bottom: 2px;
}

/* 阿P消息（右对齐, 无气泡, 纯贴图/文字） */
.jine-msg.p { justify-content: flex-end; }
.jine-msg.p .sticker-content {
    text-align: right;
}
.ame-sticker-content {
    text-align: center;
}
.ame-sticker-wrap {
    width: 44px;
    height: 44px;
}
.jine-msg.ame-sticker {
    justify-content: flex-start;
    align-items: flex-start;
    padding: 4px 0;
}
.ame-sticker-bubble {
    display: inline-block;
    padding: 6px 10px;
    background: rgba(160,216,240,0.25);
    border-radius: 8px;
}
.jine-msg.p .sticker-img {
    display: block;
    image-rendering: pixelated;
}
.jine-msg.p .time {
    font-size: 10px; color: rgba(0,0,0,0.4);
}

/* 已读标记 */
.jine-read-receipt {
    text-align: right;
    font-size: 10px;
    color: #FFFFFF;
    padding: 0 4px 6px 0;
    text-shadow: 0 1px 0 rgba(0,0,0,0.15);
    opacity: 0.85;
}

/* 日期分隔条 */
.jine-date-divider {
    text-align: center;
    margin: 8px 0;
}
.jine-date-divider span {
    background: #C8E8F8;
    color: #000;
    font-size: 11px;
    padding: 2px 14px;
    border-radius: 3px;
}

/* 系统消息（撤回等） */
.jine-system-msg {
    text-align: center;
    font-size: 10px;
    color: rgba(0,0,0,0.35);
    padding: 2px 0;
    animation: fadeIn 0.3s;
}
.jine-system-msg.recall::before { content: '↩ '; }

/* 糖糖正在输入 — inline between chat and sticker bar */
.jine-typing {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 16px;
    font-size: 11px;
    color: rgba(0,0,0,0.5);
    background: rgba(160,216,240,0.15);
    flex-shrink: 0;
}
.jine-typing .jine-avatar {
    width: 28px; height: 28px;
    border-radius: 4px;
    flex-shrink: 0;
}
.jine-typing .jine-avatar img {
    width: 100%; height: 100%;
    image-rendering: pixelated;
    border-radius: 4px;
}
.jine-typing .dots { display: inline-flex; gap: 2px; margin-left: 2px; }
.jine-typing .dots span {
    width: 4px; height: 4px;
    background: rgba(0,0,0,0.4);
    border-radius: 50%;
    animation: typeBounce 0.6s infinite alternate;
}
.jine-typing .dots span:nth-child(2) { animation-delay: 0.2s; }
.jine-typing .dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typeBounce { from { opacity: 0.3; transform: translateY(0); } to { opacity: 1; transform: translateY(-4px); } }

/* 互动聊天分隔 */
.jine-interactive {
    border-top: 1px solid rgba(200,136,192,0.4);
    flex-shrink: 0;
}
.jine-chat-msgs {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
}
.jine-chat-msgs .jine-msg { animation: fadeInUp 0.25s ease-out; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ============================================================
   回复栏 — 2×4 猫咪 sticker
   ============================================================ */
/* JINE 文字输入区 */
.jine-text-area {
    display: flex;
    gap: 4px;
    padding: 4px 8px;
    background: rgba(200,152,216,0.65);
    border-top: 1px solid #B880C8;
}
.jine-text-input {
    flex: 1;
    padding: 4px 8px;
    border: 1px solid #B880C8;
    border-radius: 4px;
    font-size: 12px;
    font-family: 'DotGothic16', 'Microsoft YaHei', sans-serif;
    background: rgba(255,255,255,0.7);
    outline: none;
}
.jine-text-input:focus {
    border-color: #E898D8;
    background: #fff;
}
.jine-text-send {
    padding: 4px 12px;
    background: #E898D8;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    font-family: 'DotGothic16', 'Microsoft YaHei', sans-serif;
    white-space: nowrap;
}
.jine-text-send:hover { background: #D878C8; }
.jine-text-send:active { transform: scale(0.95); }

.sticker-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 4px;
    padding: 6px 8px;
    background: rgba(200,152,216,0.65);
    border-top: 2px solid #B880C8;
    margin-top: 4px;
}

.sticker-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    gap: 1px;
    padding: 3px 2px 4px;
    background: transparent;
    border: none;
    cursor: pointer;
    transition: all 0.12s;
    min-height: 44px;
}
.sticker-btn:hover {
    background: rgba(255,255,255,0.2);
    border-radius: 3px;
}
.sticker-btn:active {
    transform: scale(0.93);
    background: rgba(255,255,255,0.3);
}

/* sticker 文字标签 */
.sticker-label { display:none; }

/* sticker PNG overlay (原版 stamp, 不存在时自动 fallback 到下方 CSS pixel cat) */
.sticker-img-wrap {
    position: relative;
    display: inline-block;
    width: 96px; height: 96px; }
.sticker-png {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1;
    image-rendering: pixelated;
    pointer-events: none;
    width: 96px; height: 96px; object-fit: contain;
}

/* ============================================================
   CSS 像素猫 (8 变体)
   基准: 3px 单元格, box-shadow 绘制, #FFA8C8 粉
   ============================================================ */
.pixel-cat {
    position: relative;
    width: 3px; height: 3px;
    background: #FFA8C8;
    /* 默认坐姿猫 — "好" */
    box-shadow:
        /* 耳朵 */
        6px 0 0 #FFA8C8, 9px 0 0 #FFA8C8, 18px 0 0 #FFA8C8, 21px 0 0 #FFA8C8,
        /* 头顶 + 耳根 */
        3px 3px 0 #FFA8C8, 6px 3px 0 #FFA8C8, 9px 3px 0 #FFA8C8, 12px 3px 0 #FFA8C8,
        15px 3px 0 #FFA8C8, 18px 3px 0 #FFA8C8, 21px 3px 0 #FFA8C8, 24px 3px 0 #FFA8C8,
        /* 脸 */
        3px 6px 0 #FFA8C8, 6px 6px 0 #FFA8C8, 9px 6px 0 #FFA8C8, 12px 6px 0 #FFA8C8,
        15px 6px 0 #FFA8C8, 18px 6px 0 #FFA8C8, 21px 6px 0 #FFA8C8, 24px 6px 0 #FFA8C8,
        /* 眼行（留空给眼睛） */
        3px 9px 0 #FFA8C8, 6px 9px 0 #FFA8C8, 12px 9px 0 #FFA8C8,
        15px 9px 0 #FFA8C8, 21px 9px 0 #FFA8C8, 24px 9px 0 #FFA8C8,
        /* 眼下 */
        3px 12px 0 #FFA8C8, 6px 12px 0 #FFA8C8, 9px 12px 0 #FFA8C8, 12px 12px 0 #FFA8C8,
        15px 12px 0 #FFA8C8, 18px 12px 0 #FFA8C8, 21px 12px 0 #FFA8C8, 24px 12px 0 #FFA8C8,
        /* 脸颊 */
        6px 15px 0 #FFA8C8, 9px 15px 0 #FFA8C8, 18px 15px 0 #FFA8C8, 21px 15px 0 #FFA8C8,
        /* 下巴 */
        6px 18px 0 #FFA8C8, 9px 18px 0 #FFA8C8, 12px 18px 0 #FFA8C8,
        15px 18px 0 #FFA8C8, 18px 18px 0 #FFA8C8,
        /* 身体 */
        9px 21px 0 #FFA8C8, 12px 21px 0 #FFA8C8, 15px 21px 0 #FFA8C8,
        /* 爪子 */
        6px 24px 0 #FFA8C8, 21px 24px 0 #FFA8C8;
}
/* 黑色眼睛（覆盖在眼行） */
.pixel-cat::after {
    content: '';
    position: absolute;
    width: 3px; height: 3px;
    background: #333;
    /* (9,9) 和 (18,9) */
    box-shadow: 9px 0 0 #333;
    top: 9px; left: 9px;
}

/* --- 猫变体 2: 举手 "太强了" --- */
.pixel-cat.v2 {
    box-shadow:
        6px 0 0 #FFA8C8, 9px 0 0 #FFA8C8, 18px 0 0 #FFA8C8, 21px 0 0 #FFA8C8,
        3px 3px 0 #FFA8C8, 6px 3px 0 #FFA8C8, 9px 3px 0 #FFA8C8, 12px 3px 0 #FFA8C8,
        15px 3px 0 #FFA8C8, 18px 3px 0 #FFA8C8, 21px 3px 0 #FFA8C8, 24px 3px 0 #FFA8C8,
        3px 6px 0 #FFA8C8, 6px 6px 0 #FFA8C8, 9px 6px 0 #FFA8C8, 12px 6px 0 #FFA8C8,
        15px 6px 0 #FFA8C8, 18px 6px 0 #FFA8C8, 21px 6px 0 #FFA8C8, 24px 6px 0 #FFA8C8,
        3px 9px 0 #FFA8C8, 6px 9px 0 #FFA8C8, 12px 9px 0 #FFA8C8,
        15px 9px 0 #FFA8C8, 21px 9px 0 #FFA8C8, 24px 9px 0 #FFA8C8,
        /* 举手: 胳膊向上 */
        0px 9px 0 #FFA8C8, 27px 9px 0 #FFA8C8,
        0px 6px 0 #FFA8C8, 27px 6px 0 #FFA8C8,
        3px 12px 0 #FFA8C8, 6px 12px 0 #FFA8C8, 9px 12px 0 #FFA8C8, 12px 12px 0 #FFA8C8,
        15px 12px 0 #FFA8C8, 18px 12px 0 #FFA8C8, 21px 12px 0 #FFA8C8, 24px 12px 0 #FFA8C8,
        6px 15px 0 #FFA8C8, 9px 15px 0 #FFA8C8, 18px 15px 0 #FFA8C8, 21px 15px 0 #FFA8C8,
        6px 18px 0 #FFA8C8, 9px 18px 0 #FFA8C8, 12px 18px 0 #FFA8C8,
        15px 18px 0 #FFA8C8, 18px 18px 0 #FFA8C8,
        9px 21px 0 #FFA8C8, 12px 21px 0 #FFA8C8, 15px 21px 0 #FFA8C8,
        6px 24px 0 #FFA8C8, 21px 24px 0 #FFA8C8;
}
.pixel-cat.v2::after { top: 9px; left: 9px; }

/* --- 猫变体 3: 委屈 "嘤嘤" (耷拉耳朵 + 泪滴) --- */
.pixel-cat.v3 {
    box-shadow:
        /* 垂耳 */
        3px 0 0 #FFA8C8, 6px 0 0 #FFA8C8, 21px 0 0 #FFA8C8, 24px 0 0 #FFA8C8,
        3px 3px 0 #FFA8C8, 6px 3px 0 #FFA8C8, 9px 3px 0 #FFA8C8, 12px 3px 0 #FFA8C8,
        15px 3px 0 #FFA8C8, 18px 3px 0 #FFA8C8, 21px 3px 0 #FFA8C8, 24px 3px 0 #FFA8C8,
        3px 6px 0 #FFA8C8, 6px 6px 0 #FFA8C8, 9px 6px 0 #FFA8C8, 12px 6px 0 #FFA8C8,
        15px 6px 0 #FFA8C8, 18px 6px 0 #FFA8C8, 21px 6px 0 #FFA8C8, 24px 6px 0 #FFA8C8,
        3px 9px 0 #FFA8C8, 6px 9px 0 #FFA8C8, 12px 9px 0 #FFA8C8,

/* LIVE WIDGET */
.live-widget { margin-bottom:1rem; background:rgba(0,0,0,0.5); border:2px solid #333; padding:0.5rem 0.8rem; display:flex; align-items:center; justify-content:space-between; }
.live-badge { display:flex; align-items:center; gap:0.4rem; }
.live-dot { width:10px; height:10px; background:red; border-radius:50%; animation:livePulse 1.2s infinite; }
@keyframes livePulse { 0%,100%{opacity:1;box-shadow:0 0 4px red} 50%{opacity:0.3;box-shadow:0 0 12px red} }
.live-text { color:red; font-size:0.75rem; font-weight:bold; }
.live-viewers { color:#ccc; font-size:0.7rem; }
.danmaku-bar { height:72px; width:100%; overflow:hidden; position:relative; z-index:10; margin-bottom:1rem; border-bottom:1px solid #333; cursor:default; background:rgba(0,0,0,0.35); border-top:1px solid rgba(255,255,255,0.05); }
.danmaku-wrap { position:absolute; white-space:nowrap; display:flex; align-items:center; gap:6px; will-change:left; padding:3px 6px; border-radius:3px; left:100%; animation:scrollR 16s linear infinite; }
.danmaku-wrap[data-color="white"]:hover { animation-play-state:paused !important; cursor:pointer; }
.danmaku-wrap[data-color="colored"] { pointer-events:none; }
.danmaku-text { font-size:0.8rem; line-height:1.4; pointer-events:none; }
.danmaku-text.colored { font-weight:bold; }
.danmaku-text.c-pink  { color:#FF69B4; text-shadow:0 0 6px rgba(255,105,180,0.5); }
.danmaku-text.c-cyan  { color:#00E5FF; text-shadow:0 0 6px rgba(0,229,255,0.5); }
.danmaku-text.c-green { color:#69F0AE; text-shadow:0 0 6px rgba(105,240,174,0.5); }
.danmaku-text.c-yellow{ color:#FFD740; text-shadow:0 0 6px rgba(255,215,64,0.5); }
.danmaku-trash { display:none; width:18px; height:20px; cursor:pointer; opacity:0.7; flex-shrink:0; pointer-events:auto; }
.danmaku-wrap[data-color="white"] .danmaku-trash { display:inline-block; }
.danmaku-trash:hover { opacity:1; transform:scale(1.2); }
@keyframes scrollR { from { left:100%; } to { left:-300px; } }
/* pixel trash can drawn with CSS */
.pixel-trash { display:inline-block; width:16px; height:18px; image-rendering:pixelated; position:relative; }
.pixel-trash::before { content:''; position:absolute; top:0;left:2px;width:12px;height:3px;background:#999;
    box-shadow: 0 1px 0 #777; }
.pixel-trash::after { content:''; position:absolute; top:4px;left:3px;width:10px;height:12px;background:#888;
    box-shadow: 0 1px 0 #777, 0 2px 0 #999, 1px 0 0 #666, -1px 0 0 #666; }
.pixel-trash-body { position:absolute; top:8px;left:3px;width:10px;height:2px;background:#aaa; }
@keyframes flyToTrash { 0% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.3) translateY(-20px); } 100% { opacity:0; transform:scale(0) translateY(-40px); } }
.danmaku-wrap.trashed { animation:flyToTrash 0.4s ease-out forwards; pointer-events:none; }

.trash-can img { width:32px; height:32px; image-rendering:pixelated; opacity:0.7; }
.trash-can.active { border-color:var(--pink); box-shadow:0 0 16px rgba(255,105,180,0.5); }
.trash-can.active img { opacity:1; }
.trash-can.shake { animation:shake 0.3s ease; }
.trash-count { font-size:0.55rem; color:#666; margin-top:2px; }
.trash-label { font-size:0.5rem; color:#555; margin-top:1px; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }

/* F7 BUTTON */

                    this.canvas.style.cursor = 'pointer';
                    this.canvas.addEventListener('click', function(e) { self._onCanvasClick(e); });
                }
                new ResizeObserver(function() { self._sizeCanvas(); }).observe(this.canvas.parentNode);
            },

            _sizeCanvas: function() {
                var inner = document.getElementById('webcam-inner');
                if (!inner || !this.canvas) return;
                var w = inner.clientWidth, h = inner.clientHeight;
                if (w > 0 && h > 0 && (this.canvas.width !== w || this.canvas.height !== h)) {
                    this.canvas.width = w; this.canvas.height = h;
                }
            },

            switchState: function(stateName) {
                var state = this.states[stateName];
                if (!state) return;
                this.currentState = stateName;
                this.interval = state.interval;
                this.frameIdx = 0; this.frames = [];
                var self = this;
                for (var i = 0; i < state.count; i++) {
                    var img = new Image();
                    var num = String(i).padStart(3, '0');
                    var size = (stateName === 'movie') ? '696x454' : '348x227';
                    img.src = 'img/webcam/' + stateName + '/stream_ame_' + stateName + '_' + num + '_' + size + '.png';
                    self.frames.push(img);
                }
                if (this.animId) cancelAnimationFrame(this.animId);
                if (this.smileTimer) { clearTimeout(this.smileTimer); this.smileTimer = null; }
                this.loopCount = 0; this.lastTick = 0;
                this._tick();
                this._updateMenuHighlight();
                try { localStorage.setItem('amechan_webcam_state', stateName); } catch(e) {}
            },

            _tick: function() {
                var self = this;
                this.animId = requestAnimationFrame(function(ts) { self._draw(ts); });
            },

            _draw: function(timestamp) {
                if (!this.ctx || !this.canvas) return;
                if (timestamp - this.lastTick < this.interval) { this._tick(); return; }
                this.lastTick = timestamp;
                if (this.frames.length === 0) { this._tick(); return; }
                var img = null, startIdx = this.frameIdx;
                do {
                    img = this.frames[this.frameIdx];
                    if (img && img.complete && (img.naturalWidth || img.width) > 0) break;
                    img = null;
                    this.frameIdx = (this.frameIdx + 1) % this.frames.length;
                    if (this.frameIdx === 0) {
                        this.loopCount++;
                        if (this.loopCount >= 2 && !this.smileTimer) this._autoCycleState();
                    }
                } while (this.frameIdx !== startIdx);
                if (!img) { this._tick(); return; }  // no frame loaded yet — keep last frame, don't clear
                // Advance to next frame for the next tick
                this.frameIdx = (this.frameIdx + 1) % this.frames.length;
                if (this.frameIdx === 0) {
                    this.loopCount++;
                    if (this.loopCount >= 2 && !this.smileTimer) this._autoCycleState();
                }
                var ctx = this.ctx, cw = this.canvas.width, ch = this.canvas.height;
                ctx.clearRect(0, 0, cw, ch);
                var iw = img.naturalWidth || img.width, ih = img.naturalHeight || img.height;
                var scale = Math.min(cw / iw, ch / ih);
                ctx.drawImage(img, (cw - iw * scale) / 2, (ch - ih * scale) / 2, iw * scale, ih * scale);
                this._tick();
            },

            _typingMode: false,  // set true while 糖糖 is typing a reply

            _autoCycleState: function() {
                if (this._typingMode) { this.loopCount = 0; return; }  // don't interrupt typing
                var self = this; this.loopCount = 0;
                // Common pool (90% chance)
                var common = ['smile','selfie','tv','voice_training','egosearching','comic','handspinner','headphone','henoji','movie','nail','sleep'];
                // Rare pool — hair variants (10% chance)
                var rare = ['hair_drill','hair_long','hair_poney','hair_side','henoji_dark','egosearching_ura'];
                var pool = Math.random() < 0.10 ? rare : common;
                var next = pool[Math.floor(Math.random() * pool.length)];
                if (next === this.currentState) next = common[0];  // fallback to smile
                setTimeout(function() { self.switchState(next); }, 500 + Math.random() * 1500);
            },

            _onCanvasClick: function(e) {
                if (e.target.closest('#webcam-state-menu')) return;
                var self = this;
                if (this.smileTimer) clearTimeout(this.smileTimer);
                if (this.currentState !== 'smile') this.switchState('smile');
                this.smileTimer = setTimeout(function() {
                    self.smileTimer = null;
                    self._autoCycleState();
                }, 2500 + Math.random() * 1500);
            },

            _bindMenu: function() {
                var self = this;
                var titlebar = document.getElementById('webcam-titlebar');
                var menu = document.getElementById('webcam-state-menu');
                if (!titlebar || !menu) return;
                var html = '';
                var stateKeys = Object.keys(this.states);
                for (var i = 0; i < stateKeys.length; i++) {
                    var key = stateKeys[i], st = this.states[key];
                    html += '<div class="state-opt" data-state="' + key + '">' + st.label + ' <span style="color:#666;font-size:0.45rem;">(' + st.count + 'f)</span></div>';
                }
                menu.innerHTML = html;
                titlebar.addEventListener('mousedown', function(e) {
                    e.stopPropagation();
                    self.menuOpen = !self.menuOpen;
                    menu.classList.toggle('open', self.menuOpen);
                });
                // Prevent click from bubbling to document (would immediately close menu)
                titlebar.addEventListener('click', function(e) {
                    e.stopPropagation();
                });
                menu.addEventListener('click', function(e) {
                    var opt = e.target.closest('.state-opt');
                    if (!opt) return;
                    var state = opt.dataset.state;
                    if (state) { self.switchState(state); self.menuOpen = false; menu.classList.remove('open'); }
                });
                document.addEventListener('click', function() {
                    if (self.menuOpen) { self.menuOpen = false; menu.classList.remove('open'); }
                });
                this._updateMenuHighlight();
            },

            _updateMenuHighlight: function() {
                var menu = document.getElementById('webcam-state-menu');
                if (!menu) return;
                var opts = menu.querySelectorAll('.state-opt');
                for (var i = 0; i < opts.length; i++) opts[i].classList.toggle('current', opts[i].dataset.state === this.currentState);
            },

            autoState: function(stress, affection, darkness) {
                var ns = this.currentState;
                if (darkness > 80) ns = ['sleep','egosearching_ura','handspinner','henoji_dark'][Math.floor(Math.random()*4)];
                else if (stress > 80) ns = ['headphone','nail','henoji_dark','egosearching_ura'][Math.floor(Math.random()*4)];
                else if (affection > 70 && darkness < 50) ns = ['smile','selfie','comic'][Math.floor(Math.random()*3)];
                else if (Math.random() < 0.1) ns = ['smile','selfie','tv','voice_training','egosearching','hair_drill'][Math.floor(Math.random()*6)];
                if (ns !== this.currentState) this.switchState(ns);
            }
        };

        // Init webcam — deferred to avoid blocking timeline fetch
        // Webcam frames load on-demand per state (~2-12 images each), not all 84 at once
        setTimeout(function() { WebcamEngine.init(); }, 400);

        // Drag webcam window (fixed positioning)
        (function() {
            var el = document.getElementById('webcam-container');
            if (!el) return;
            var dragging = false, sx = 0, sy = 0, ox = 0, oy = 0;
            el.addEventListener('mousedown', function(e) {
                if (e.target.closest('#webcam-titlebar') || e.target.closest('#webcam-state-menu')) return;
                dragging = true;
                sx = e.clientX; sy = e.clientY;
                ox = parseInt(el.style.left) || 20;
                oy = parseInt(el.style.top) || 80;
                el.style.cursor = 'grabbing';
                e.preventDefault();
            });
            document.addEventListener('mousemove', function(e) {
                if (!dragging) return;
                el.style.left = (ox + e.clientX - sx) + 'px';
                el.style.top = (oy + e.clientY - sy) + 'px';
            });
            document.addEventListener('mouseup', function() {
                dragging = false;
                el.style.cursor = 'grab';
            });
            el.style.cursor = 'grab';
        })();

var SaveManager = {
    STORAGE_KEY: "amechan_saves",
    data: null,

    init: function() {
        var raw = localStorage.getItem(this.STORAGE_KEY);
        if (raw) {
            try { this.data = JSON.parse(raw); } catch(e) { this.data = null; }
        }
        if (!this.data || !this.data.slots || Object.keys(this.data.slots).length === 0) {
            var slotId = "slot_" + Date.now();
            this.data = { version: 1, currentSlot: slotId, slots: {} };
            this.data.slots[slotId] = this._createSlotData("默认存档");
            this._persist();
        }
        return this;
    },

    _createSlotData: function(name) {
        return {
            name: name, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
            jineChat: [], releasedEntries: [], timeline: [], feedCursor: 0,
            stats: { followers: 980, stress: 42, affection: 78, darkness: 55 }, trashCount: 0
        };
    },

    _persist: function() { localStorage.setItem(this.STORAGE_KEY, JSON.stringify(this.data)); },

    getCurrentSlot: function() {
        var id = this.data.currentSlot;
        return { id: id, data: this.data.slots[id] };
    },

    listSlots: function() {
        var self = this;
        return Object.keys(this.data.slots).map(function(id) {
            var s = self.data.slots[id];
            return { id: id, name: s.name, createdAt: s.createdAt, updatedAt: s.updatedAt,
                     entryCount: s.releasedEntries.length, chatCount: s.jineChat.length, feedCursor: s.feedCursor || 0 };
        });
    },

    createSlot: function(name) {
        var id = "slot_" + Date.now();
        this.data.slots[id] = this._createSlotData(name || "新存档");
        this._persist(); return id;
    },

    switchSlot: function(id) {
        if (!this.data.slots[id]) return false;
        this.data.currentSlot = id; this._persist(); return true;
    },

    deleteSlot: function(id) {
        var keys = Object.keys(this.data.slots);
        if (keys.length <= 1) return false;
        if (this.data.currentSlot === id) {
            var others = keys.filter(function(k) { return k !== id; });
            this.data.currentSlot = others[0];
        }
        delete this.data.slots[id]; this._persist(); return true;
    },

    getJineChat: function() { var s = this.getCurrentSlot(); return s.data ? s.data.jineChat.slice() : []; },
    addJineMessage: function(msg) {
        var slot = this.data.slots[this.data.currentSlot]; if (!slot) return;
        slot.jineChat.push(msg); if (slot.jineChat.length > 60) slot.jineChat = slot.jineChat.slice(-60);
        slot.updatedAt = new Date().toISOString(); this._persist();
    },
    addReleasedEntry: function(entry) {
        var slot = this.data.slots[this.data.currentSlot]; if (!slot) return;
        slot.releasedEntries.push(entry);
        if (!slot.timeline) slot.timeline = [];
        slot.timeline.push(entry);  // also store in per-slot timeline
        slot.updatedAt = new Date().toISOString(); this._persist();
    },
    getReleasedEntries: function() { var s = this.getCurrentSlot(); return s.data ? s.data.releasedEntries.slice() : []; },
    getStats: function() { var s = this.getCurrentSlot(); return s.data ? Object.assign({}, s.data.stats) : { followers: 980, stress: 42, affection: 78, darkness: 55 }; },
    updateStats: function(updates) {
        var slot = this.data.slots[this.data.currentSlot]; if (!slot) return;
        Object.assign(slot.stats, updates); slot.updatedAt = new Date().toISOString(); this._persist();
    },
    getTrashCount: function() { var s = this.getCurrentSlot(); return s.data ? s.data.trashCount : 0; },
    setTrashCount: function(count) {
        var slot = this.data.slots[this.data.currentSlot]; if (!slot) return;
        slot.trashCount = count; this._persist();
    },
    getFeedCursor: function() { var s = this.getCurrentSlot(); return s.data ? (s.data.feedCursor || 0) : 0; },
    setFeedCursor: function(cursor) {
        var slot = this.data.slots[this.data.currentSlot]; if (!slot) return;
        slot.feedCursor = cursor; slot.updatedAt = new Date().toISOString(); this._persist();
    },
    incrementFeedCursor: function() {
        var slot = this.data.slots[this.data.currentSlot]; if (!slot) return;
        slot.feedCursor = (slot.feedCursor || 0) + 1; slot.updatedAt = new Date().toISOString(); this._persist();
    },
    getTimeline: function() {
        var s = this.getCurrentSlot(); return s.data ? (s.data.timeline || []).slice() : [];
    },
    mergeTimeline: function(items, sinceTimestamp) {
        var slot = this.data.slots[this.data.currentSlot]; if (!slot) return 0;
        if (!slot.timeline) slot.timeline = [];
        var existing = {};
        slot.timeline.forEach(function(e) { existing[e.batch_id + '|' + e.time + '|' + e.text] = true; });
        var added = 0;
        items.forEach(function(e) {
            // Only accept entries created after slot was born (prevents cross-slot leakage)
            if (sinceTimestamp && (e.timestamp || 0) * 1000 <= sinceTimestamp) return;
            var key = (e.batch_id || '') + '|' + (e.time || '') + '|' + (e.text || '');
            if (!existing[key]) { slot.timeline.push(e); existing[key] = true; added++; }
        });
        if (added > 0) { slot.updatedAt = new Date().toISOString(); this._persist(); }
        return added;
    }
};

function trashDanmaku(wrap) {
    if (!wrap || wrap.classList.contains('trashed')) return;
    if (wrap.dataset.color !== 'white') return;  // colored can't be deleted

    var wasTucao = wrap.dataset.type === 'tucao';
    wrap.classList.add('trashed');
    trashCount++;
    document.getElementById('trash-count').textContent = trashCount;
    SaveManager.setTrashCount(trashCount);

    var can = document.getElementById('trash-can');
    can.classList.add('shake','active');
    setTimeout(function() { can.classList.remove('shake','active'); }, 400);

    // Delete 吐槽 → Stress −1
    if (wasTucao) {
        _stressFromDanmaku -= 1;
        applyDanmakuStress();
    }

    // Respawn after 1s
    setTimeout(function() {
        wrap.classList.remove('trashed');
        spawnDanmakuContent(wrap);
    }, 1000);
}

// Fetch
var _fetchRetries = 0;
function fetchTimeline() {
    console.log('[fetchTimeline] fetching... (retry#' + _fetchRetries + ')');
    if (firstLoad && _fetchRetries === 0) {
        CONTAINER.innerHTML = '<div class="empty-state"><div class="icon"><img src="img/icon_cho.png"></div><p>连接超天酱中...<br><span style="font-size:0.55rem;color:#555;">' + new Date().toLocaleTimeString() + '</span></p></div>';
    }
    fetch(API + '/api/timeline').then(function(r) { return r.json(); }).then(function(data) {
        console.log('[fetchTimeline] got', data.count, 'items, pool:', data.pool_remaining);
        var serverItems = data.timeline || [];
        poolRemaining = data.pool_remaining || 0;
        updatePoolCount();

        // Merge server items into current slot — only entries after slot creation
        if (serverItems.length > 0) {
            var slotData = SaveManager.getCurrentSlot().data;
            var slotBorn = slotData ? new Date(slotData.createdAt).getTime() : 0;
            SaveManager.mergeTimeline(serverItems, slotBorn);
        }
        // Reload cachedTimeline from slot (includes previous sessions)
        cachedTimeline = SaveManager.getTimeline();

        // If still empty (server hasn't generated yet), keep polling
        if (cachedTimeline.length === 0) {
            console.log('[fetchTimeline] feed empty, polling in 3s...');
            setTimeout(fetchTimeline, 3000);
            return;
        }

        _fetchRetries = 0;
        if (firstLoad) {
            console.log('[fetchTimeline] firstLoad render, items:', cachedTimeline.length);
            renderFromCache();
            firstLoad = false;
            return;
        }
        // Check for new batches
        var hasNew = cachedTimeline.some(function(e) { return !knownBatches[e.batch_id]; });
        if (hasNew) {
            cachedTimeline.forEach(function(e) { knownBatches[e.batch_id] = true; });
            renderFromCache();
        }
    }).catch(function(err) {
        console.warn('[fetchTimeline] API unavailable, trying static mode:', err.message);
        // Fallback: try loading feed.json directly (GitHub Pages)
        fetch('data/feed.json').then(function(r) { return r.json(); }).then(function(data) {
            _fetchRetries = 0;
            isStaticMode = true;
            var items = data.timeline || [];
            poolRemaining = 0;
            updatePoolCount();
            if (items.length > 0) {
                var slotData2 = SaveManager.getCurrentSlot().data;
                var slotBorn2 = slotData2 ? new Date(slotData2.createdAt).getTime() : 0;
                SaveManager.mergeTimeline(items, slotBorn2);
            }
            cachedTimeline = SaveManager.getTimeline();
            console.log('[fetchTimeline] static mode, items:', cachedTimeline.length);
            if (cachedTimeline.length === 0) {
                setTimeout(fetchTimeline, 5000);
                return;
            }
            if (firstLoad) { renderFromCache(); firstLoad = false; enterStaticMode(); }
        }).catch(function(err2) {
            console.error('[fetchTimeline] static fallback also failed:', err2);
            // Retry with backoff — keep firstLoad alive
            _fetchRetries++;
            var delay = Math.min(3000 * _fetchRetries, 15000);
            console.log('[fetchTimeline] retry in', delay + 'ms');
            setTimeout(fetchTimeline, delay);
        });
    });
}

// F7 Release — v2.8: O(1) single API call, no more generate+release
// Backend handles regeneration internally (waterline + background thread)
window.doRelease = function() {
    if (isStaticMode) return;
    var btn = document.getElementById('f7-btn');
    if (!btn) return;
    btn.classList.add('shaking');
    btn.textContent = '...';
    btn.disabled = true;

    fetch(API + '/api/release', { method: 'POST' }).then(function(r) { return r.json(); }).then(function(data) {
        btn.classList.remove('shaking');
        btn.disabled = false;
        if (data.ok) {
            var entries = data.entries || [];
            console.log('[doRelease] got', entries.length, 'entries:', entries.map(function(e){return e.layer;}));
            // Save to current save slot
            for (var n = 0; n < entries.length; n++) {
                SaveManager.incrementFeedCursor();
                SaveManager.addReleasedEntry(entries[n]);
            }
            updateSaveIndicator();
            // v2.8: Render directly from local cache — NO fetchTimeline race!
            cachedTimeline = SaveManager.getTimeline();
            renderFromCache();
            btn.textContent = '已发送! ✨';
            // JINE follow-up messages (staggered)
            var jineMsgs = data.jine_msgs || [];
            if (jineMsgs.length > 0) {
                setTimeout(function() {
                    jineMsgs.forEach(function(msg, i) {
                        setTimeout(function() {
                            var replyText = (msg.reply && msg.reply !== 'undefined') ? msg.reply : '';
                            var chatMsg = {
                                time: msg.time || '', reply: replyText,
                                ame_sticker: msg.ame_sticker || null,
                                player_text: '', sticker: ''
                            };
                            jineChatMsgs.push(chatMsg);
                            SaveManager.addJineMessage(chatMsg);
                            if (ACTIVE_TAB === 'jine') renderJineChatMsgs();
                        }, i * 2000 + 600);
                    });
                }, 800);
            }
            setTimeout(function() { btn.textContent = '[ F7 ] 戳一戳 ✨'; }, 2000);
        } else {
            // Pool completely empty — backend is regenerating, tell user to retry
            console.log('[doRelease] pool empty, retry: ' + (data.msg || ''));
            alert(data.msg || '超天酱正在构思推文，请稍等几秒再戳哦！');
            btn.textContent = '[ F7 ] 戳一戳 ✨';
        }
        updatePoolCount();
    }).catch(function(err) {
        console.error('[doRelease] error:', err);
        btn.textContent = '[ F7 ] 戳一戳 ✨';
        btn.disabled = false;
        btn.classList.remove('shaking');
    });

// ============================================================
// Reply cycle v2.8 — overlap API time with typing time, unified endpoint
// ============================================================
function _startReplyCycle() {
    // v2.8: Don't abort in-flight requests — let them complete naturally.
    // If a new message arrives while one is pending, mark it for the NEXT cycle.
    if (_replyPending) {
        _hasPendingFollowup = true;  // will auto-trigger next cycle after current completes
        return;
    }

    _replyPending = true;
    var cycleStart = Date.now();

    // v2.9: Reply to ONE message at a time — find the OLDEST unreplied player message
    // This prevents batching multiple player messages into one API call (forced Q&A pattern)
    var targetIdx = -1, targetText = '', targetSticker = '';
    for (var i = 0; i < jineChatMsgs.length; i++) {
        var m = jineChatMsgs[i];
        if (m.reply) continue;  // skip already-replied
        if (m.player_text) { targetIdx = i; targetText = m.player_text; break; }
        if (m.sticker)     { targetIdx = i; targetSticker = m.sticker; break; }
    }
    if (targetIdx < 0) { _replyPending = false; return; }
    var replyIdx = targetIdx + 1;  // insert reply right after this message

    // Typing indicator after 800ms
    setTimeout(function() { showAmeTyping(); }, 800);

    // Build unified request body — send full recent history to backend
    var recentMsgs = jineChatMsgs.slice(-10).map(function(m) {
        var entry = {};
        if (m.player_text) entry.player_text = m.player_text;
        if (m.sticker) entry.sticker = m.sticker;
        if (m.reply) entry.reply = m.reply;
        if (m.ame_sticker) entry.ame_sticker = m.ame_sticker;
        return entry;
    });
    var isPureSticker = !targetText && !!targetSticker;
    var requestBody = {
        text: targetText || '',
        sticker: targetSticker || '',
        history: recentMsgs
    };

    // Unified endpoint — backend routes internally
    fetch(API + '/api/jine/chat', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(requestBody)
    }).then(function(r) { return r.json(); }).then(function(data) {
        _replyPending = false;

        var replyText = data.reply || '';
        var apiDuration = Date.now() - cycleStart;

        // v2.8: Overlap — API time IS 糖糖's "thinking and typing" time
        var expectedTypingTime = 1500 + (replyText.length * 100);
        expectedTypingTime = Math.min(expectedTypingTime, 7000);
        var remainWait = Math.max(0, expectedTypingTime - apiDuration);

        setTimeout(function() {
            hideAmeTyping();
            endAmeResponse();
            var replyMsg = {
                time: data.time || ('0'+new Date().getHours()).slice(-2)+':'+('0'+new Date().getMinutes()).slice(-2),
                reply: replyText, ame_sticker: data.ame_sticker || null,
                recall: false
            };
            if (replyIdx < jineChatMsgs.length) {
                jineChatMsgs.splice(replyIdx, 0, replyMsg);
            } else {
                jineChatMsgs.push(replyMsg);
            }
            SaveManager.addJineMessage(replyMsg);
            if (ACTIVE_TAB === 'jine') renderJineChatMsgs();
            // Check if more messages arrived during the API call → another cycle
            if (_hasPendingFollowup) {
                _hasPendingFollowup = false;
                startAmeResponse();
                _startReplyCycle();
            }
        }, remainWait);
    }).catch(function(err) {
        console.warn('[replyCycle] error:', err.name || err.message);
        var elapsed = Date.now() - cycleStart;
        var remainWait = Math.max(800, 2200 - elapsed);
        setTimeout(function() {
            hideAmeTyping();
            endAmeResponse();
            _replyPending = false;
            var fb = { time: ('0'+new Date().getHours()).slice(-2)+':'+('0'+new Date().getMinutes()).slice(-2),
                reply: ['...','嗯','知道了','哼'][Math.floor(Math.random()*4)], recall: false };
            if (replyIdx < jineChatMsgs.length) { jineChatMsgs.splice(replyIdx, 0, fb); } else { jineChatMsgs.push(fb); }
            SaveManager.addJineMessage(fb);
            if (ACTIVE_TAB === 'jine') renderJineChatMsgs();
        }, remainWait);
    });
}

function renderJineChatUnified(timelineItems) {

    var chatMsgs = jineChatMsgs;
    chatMsgs.forEach(function(msg) {
        var t = msg.time || '';
        if (msg.sticker)     all.push({ type: 'p-sticker', time: t, sticker: msg.sticker });
        if (msg.player_text) all.push({ type: 'p-text',    time: t, text: msg.player_text });
        if (msg.recall)      all.push({ type: 'recall',    time: t });
        if (msg.ame_sticker) all.push({ type: 'ame-sticker', time: t, sticker: msg.ame_sticker });
        if (msg.reply)       all.push({ type: 'ame-text',  time: t, text: msg.reply });
    });
    all.sort(function(a, b) { return (a.time||'00:00').localeCompare(b.time||'00:00'); });

    function toMins(t) { var p = (t||'00:00').split(':'); return parseInt(p[0])*60 + parseInt(p[1]); }

    var html = '';
    var lastMins = -99;
    for (var i = 0; i < all.length; i++) {
        var m = all[i];
        var mins = toMins(m.time);
        if (mins - lastMins > 5 || i === 0) {
            html += '<div class="jine-date-divider"><span>' + esc(m.time) + '</span></div>';
        }
        lastMins = mins;
        switch (m.type) {
        case 'ame-text':
            // Safety: parse [stamp:xxx] markers that the backend may have missed
            var cleanText = m.text || '';
            var rx = /\[stamp:\s*([a-zA-Z_]+)\]/g;
            var match;
            while ((match = rx.exec(m.text)) !== null) {
                var sid = match[1];
                if (findSticker(sid)) {
                    html += '<div class="jine-msg ame-sticker"><div class="jine-avatar"><img src="img/icon_ame.png"></div><div><div class="jine-bubble stamp-msg">' + stickerHTML(sid) + '</div></div></div>';
                    cleanText = cleanText.replace(match[0], '');
                }
            }
            cleanText = cleanText.replace(/\s+/g, ' ').trim();
            if (cleanText) {
                html += '<div class="jine-msg ame"><div class="jine-avatar"><img src="img/icon_ame.png"></div><div class="bubble">' + esc(cleanText) + '</div></div>';
            }
            break;
        case 'recall': case 'recall-tl':
            html += '<div class="jine-system-msg recall">糖糖撤回了一条消息</div>';
            break;
        case 'p-sticker':
            html += '<div class="jine-msg p"><div class="sticker-content">' + stickerHTML(m.sticker) + '</div></div>';
            html += '<div class="jine-read-receipt">已读</div>';
            break;
        case 'p-text':
            html += '<div class="jine-msg p-text"><div class="bubble player-text-bubble">' + esc(m.text) + '</div></div>';
            html += '<div class="jine-read-receipt">已读</div>';
            break;
        case 'ame-sticker':
            html += '<div class="jine-msg ame-sticker"><div class="jine-avatar"><img src="img/icon_ame.png"></div><div><div class="jine-bubble stamp-msg">' + stickerHTML(m.sticker) + '</div></div></div>';
            break;
        }
    }

    container.innerHTML = html || '<div class="empty-state"><div class="icon"><img src="img/icon_ame.png"></div><p style="font-size:0.7rem;color:rgba(0,0,0,0.4);">糖糖还没发消息...</p></div>';
    container.scrollTop = container.scrollHeight;
    // Show read receipts progressively — first batch at 1.2s, each subsequent render fires independently
    setTimeout(function() {
        var all = container.querySelectorAll('.jine-read-receipt');
        for (var rj = 0; rj < all.length; rj++) { all[rj].classList.add('show'); }
    }, 1200);
}
function fetchJineChat() {
    jineChatMsgs = SaveManager.getJineChat();
    if (ACTIVE_TAB === 'jine') renderJineChatMsgs();
}

// Trigger words — local instant replies without API (F12)
function checkTriggerWords(text) {
    if (!text) return null;
    var t = text.toLowerCase();
    if (/(爱你|喜欢|想你|抱|亲|贴贴|老婆|宝贝)/.test(t)) return { reply: '...笨蛋', ame_sticker: 'ame_blush' };
    if (/(晚安|睡觉|拜拜|再见|bye)/.test(t)) return { reply: '嗯...晚安', ame_sticker: null };
    if (/(揍你|打你|敲你|笨蛋|傻瓜)/.test(t)) return { reply: '你才笨蛋！', ame_sticker: 'ame_tsun' };
    return null;
}

// Send text from textarea — queues message, triggers batched reply cycle
window.sendText = function() {
    try {
    var input = document.getElementById('jine-text-input');
    if (!input) { console.warn('[sendText] no input element'); return; }
    var text = input.value.trim();
    if (!text) return;
    input.value = '';
    console.log('[sendText] sending:', text.slice(0,30));
    startAmeResponse();
    var now = new Date();
    var timeStr = ('0'+now.getHours()).slice(-2) + ':' + ('0'+now.getMinutes()).slice(-2);

    // Trigger words: instant local reply, no API call (protected)
    var trigger = null;
    try { trigger = checkTriggerWords(text); } catch(e) { console.warn('[sendText] trigger error:', e); }
    if (trigger) {
        jineChatMsgs.push({ time: timeStr, player_text: text, reply: trigger.reply, ame_sticker: trigger.ame_sticker || null, recall: false });
        var last = jineChatMsgs[jineChatMsgs.length - 1];
        if (last) SaveManager.addJineMessage(last);
        setTimeout(function() { endAmeResponse(); if (ACTIVE_TAB === 'jine') renderJineChatMsgs(); }, 600);
        return;
    }

    var playerMsg = { time: timeStr, player_text: text, reply: '', recall: false };
    jineChatMsgs.push(playerMsg);
    SaveManager.addJineMessage(playerMsg);  // persist immediately
    if (ACTIVE_TAB === 'jine') renderJineChatMsgs();
    _startReplyCycle();
    } catch(e) { console.error('[sendText] crashed:', e); }
};

// Enter sends, Shift+Enter newline
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && document.activeElement === document.getElementById('jine-text-input')) {
        if (e.shiftKey) return;
        e.preventDefault();
        sendText();
    }
});

function sendSticker(stickerId) {
    try {
    startAmeResponse();
    var sticker = STICKERS.find(function(s) { return s.id === stickerId; });
    if (!sticker) { endAmeResponse(); return; }

    var now = new Date();
    var timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    var stickerMsg = { time: timeStr, sticker: stickerId, reply: '', recall: false };
    jineChatMsgs.push(stickerMsg);
    SaveManager.addJineMessage(stickerMsg);
    if (ACTIVE_TAB === 'jine') renderJineChatMsgs();
    _startReplyCycle();
    } catch(e) { console.error('[sendSticker] crashed:', e); }
}

// Init
SaveManager.init();
loadStatsFromSlot();
updateSaveIndicator();
bgmInit();
// Auto-play on first user interaction (browser policy requires user gesture)
(function() {
    var _done = false;
    function _try() {
        if (_done) return; _done = true;
        if (!bgmPlaying) bgmToggle();
        document.removeEventListener('click',_try);
        document.removeEventListener('keydown',_try);
        document.removeEventListener('touchstart',_try);
    }
    document.addEventListener('click',_try);
    document.addEventListener('keydown',_try);
    document.addEventListener('touchstart',_try);
    var p=document.getElementById('bgm-play'); if(p) p.textContent='⏳';
    var t=document.getElementById('bgm-track'); if(t) t.textContent='点击任意处开始播放';
})();
initDanmaku();
jiggleLive();
jiggleStats();
setInterval(jiggleStats, 15000);
fetchTimeline();
// Poll for new content every 30s (empty-feed fast poll handled inside fetchTimeline)
if (!isStaticMode) {
    setInterval(fetchTimeline, 30000);
}
console.log('+ Poketter v2.7.2 ready +');
})();
</script>
