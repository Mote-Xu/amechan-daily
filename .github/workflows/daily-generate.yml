name: Generate Daily Tweets

on:
  schedule:
    # UTC 00:07 = 北京时间 08:07 (利用 off-peak 分钟避免舰队惊群)
    - cron: '7 0 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: '指定话题（留空则随机）'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai python-dotenv

      - name: Generate tweets
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            python generator.py "${{ github.event.inputs.topic }}"
          else
            python generator.py
          fi

      - name: Commit & push feed.json
        run: |
          git config user.name "amechan-bot"
          git config user.email "amechan-bot@users.noreply.github.com"
          git add data/feed.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 auto: daily tweet generation"
            git push
          fi
